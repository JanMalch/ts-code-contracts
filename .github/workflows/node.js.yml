name: Build
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js 25
      uses: actions/setup-node@v5
      with:
        node-version: 25
    - run: npm ci
    - run: npm run build
    - run: npm test
